<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Sistema de Gestión de Enfermería</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Manifest y Service Worker -->
  <link rel="manifest" href="manifest.json">
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('service-worker.js')
        .then(() => console.log("Service Worker registrado"))
        .catch(err => console.error("Error registrando SW:", err));
    }
  </script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #ecf0f1;
      margin: 0;
      padding: 20px;
    }
    header {
      background: #2c3e50;
      color: white;
      padding: 15px;
      text-align: center;
    }
    h1 {
      margin: 0;
    }
    form {
      background: white;
      padding: 15px;
      border-radius: 8px;
      margin-top: 20px;
    }
    label {
      display: block;
      margin-top: 10px;
    }
    input, textarea {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }
    button {
      margin-top: 15px;
      padding: 10px;
      background: #2c3e50;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    table {
      width: 100%;
      margin-top: 20px;
      border-collapse: collapse;
      background: white;
    }
    th, td {
      border: 1px solid #ccc;
      padding: 8px;
      text-align: left;
    }
    th {
      background: #2c3e50;
      color: white;
    }
  </style>
</head>
<body>
  <header>
    <h1>Sistema de Gestión de Enfermería</h1>
  </header>

  <form id="pacienteForm">
    <label>Nombre del paciente:</label>
    <input type="text" id="nombre" required>

    <label>Edad:</label>
    <input type="number" id="edad" required>

    <label>Diagnóstico:</label>
    <textarea id="diagnostico" required></textarea>

    <button type="submit">Guardar paciente</button>
  </form>

  <table id="tablaPacientes">
    <thead>
      <tr>
        <th>Nombre</th>
        <th>Edad</th>
        <th>Diagnóstico</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <script>
    const form = document.getElementById('pacienteForm');
    const tabla = document.getElementById('tablaPacientes').querySelector('tbody');

    // Cargar pacientes guardados
    let pacientes = JSON.parse(localStorage.getItem('pacientes')) || [];
    renderTabla();

    form.addEventListener('submit', e => {
      e.preventDefault();
      const nombre = document.getElementById('nombre').value;
      const edad = document.getElementById('edad').value;
      const diagnostico = document.getElementById('diagnostico').value;

      pacientes.push({ nombre, edad, diagnostico });
      localStorage.setItem('pacientes', JSON.stringify(pacientes));

      form.reset();
      renderTabla();
    });

    function renderTabla() {
      tabla.innerHTML = '';
      pacientes.forEach(p => {
        const fila = document.createElement('tr');
        fila.innerHTML = `<td>${p.nombre}</td><td>${p.edad}</td><td>${p.diagnostico}</td>`;
        tabla.appendChild(fila);
      });
    }
  </script>
</body>
</html>
